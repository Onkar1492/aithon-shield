# Aithon Shield — Self-Hosted Docker Compose
# P6-I3: Air-gap / self-hosted packaging
#
# Usage:
#   cp .env.example .env   # then fill in your values
#   docker compose up -d
#
# Air-gap:
#   docker compose pull     # (while online)
#   docker save aithon-shield postgres:16-alpine | gzip > aithon-airgap-bundle.tar.gz
#   # transfer to air-gapped host, then:
#   docker load < aithon-airgap-bundle.tar.gz
#   docker compose up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-aithon_shield}
      POSTGRES_USER: ${PGUSER:-aithon}
      POSTGRES_PASSWORD: ${PGPASSWORD:?Set PGPASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-aithon} -d ${PGDATABASE:-aithon_shield}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: aithon-shield:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-5001}:5001"
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${PGUSER:-aithon}:${PGPASSWORD}@db:5432/${PGDATABASE:-aithon_shield}?sslmode=disable
      PORT: "5001"
      COOKIE_SECURE: "false"
      AITHON_SELF_HOSTED: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  pgdata:
    driver: local
